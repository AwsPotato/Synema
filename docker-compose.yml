version: "3.9"

services:
  # ─── Reverse Proxy ─────────────────────────────
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Frontend (Next.js) ────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
    command: npm run dev
    expose:
      - "3000"
    restart: unless-stopped

  # ─── Backend (NestJS) ──────────────────────────
  backend:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app
    command: npm run start:dev
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgres://synema:synema@postgres:5432/synema
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synema
      POSTGRES_PASSWORD: synema
      POSTGRES_DB: synema
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

volumes:
  pgdata:
